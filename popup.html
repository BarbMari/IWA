<h1>IWA</h1>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Régua de Leitura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 200px;
    }
    #toggleBtn {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    #toggleBtn.desativar {
      background-color: #d9534f;
    }
    #cores {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .cor-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="toggleBtn">Ativar Régua de leitura</button>
  <div id="cores" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
